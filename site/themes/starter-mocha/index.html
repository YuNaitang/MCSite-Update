<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minecraft Server</title>
  <script>try{var _n=localStorage.getItem('mc_site_name');if(_n)document.title=_n}catch(e){}</script>
  <meta name="description" content="Minecraft 服务器官网" />
  <link rel="stylesheet" href="../shared/css/reset.css" />
  <link rel="stylesheet" href="css/style.css?v=2" />
  <link rel="stylesheet" href="css/animations.css?v=2" />
  <link rel="stylesheet" href="css/responsive.css?v=2" />
  <link rel="stylesheet" href="fonts/fonts.css" />
  <script src="vendor/js/echarts.min.js"></script>
  <script src="vendor/js/lucide.min.js"></script>
  <script>
  (function(){
    try {
      var ts = JSON.parse(localStorage.getItem('mc_theme_cache') || '{}');
      var hasImg = ts.hero_image && ts.hero_image.trim();
      var s = document.createElement('style');
      s.id = 'theme-preload';

      var bgCss = '.hero-bg{background:#1e1e2e!important}';
      if (hasImg) {
        var url = ts.hero_image.startsWith('http') ? ts.hero_image : '/' + ts.hero_image.replace(/^\//, '');
        bgCss = '.hero-bg{background:url("'+url+'") center/cover no-repeat!important}';
      }
      s.textContent = bgCss + '.hero-bg{opacity:0;transition:opacity 0.5s ease}.hero-bg.reveal{opacity:1}.navbar{opacity:0;transition:opacity 0.4s ease 0.15s}.navbar.reveal{opacity:1}';
      document.head.appendChild(s);
    } catch(e){}
  })();
  </script>
</head>
<body>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="container navbar-inner">
      <a href="#" class="nav-logo" id="nav-logo"><script>try{document.write(localStorage.getItem('mc_site_name')||'MC Server')}catch(e){document.write('MC Server')}</script></a>
      <div class="nav-links">
        <a href="#status">状态</a>
        <a href="#gallery">图集</a>
        <a href="#news">动态</a>
        <a href="#comments">留言</a>
        <a href="#whitelist">白名单</a>
      </div>
      <button class="nav-toggle" id="nav-toggle" aria-label="菜单">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- 第一屏：Hero 区 -->
  <section class="hero" id="hero">
    <canvas class="hero-particles" id="hero-particles"></canvas>
    <div class="hero-bg"></div>
    <div class="container hero-content">
      <h1 class="hero-title" id="hero-title">欢迎来到服务器</h1>
      <div class="hero-motd-wrap">
        <div class="hero-motd" id="hero-motd">&nbsp;</div>
      </div>
      <div class="hero-stats">
        <div class="hero-stat">
          <span class="hero-stat-value" id="hero-online">-</span>
          <span class="hero-stat-label">在线玩家</span>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat">
          <span class="hero-stat-value" id="hero-max">-</span>
          <span class="hero-stat-label">最大人数</span>
        </div>
        <div class="hero-stat-divider"></div>
        <div class="hero-stat">
          <span class="hero-stat-value" id="hero-status-dot"><span class="status-dot"></span></span>
          <span class="hero-stat-label" id="hero-status-text">检测中</span>
        </div>
      </div>
      <div class="hero-address">
        <span class="address-label">服务器地址</span>
        <code class="address-value" id="server-address">加载中...</code>
        <button class="copy-btn" id="copy-btn" title="复制地址"><i data-lucide="copy" style="width:14px;height:14px;vertical-align:-2px;margin-right:4px;"></i>复制</button>
      </div>
    </div>
    <div class="hero-scroll" id="hero-scroll">
      <span class="hero-scroll-text">探索更多</span>
      <svg class="hero-scroll-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12l7 7 7-7"/>
      </svg>
    </div>
  </section>

  <!-- 服务器状态详情 -->
  <section class="section" id="status">
    <div class="container">
      <h2 class="section-title fade-up" id="section-servers-title">服务器状态</h2>
      <div class="status-grid fade-up">
        <div class="status-card">
          <div class="status-card-icon"><i data-lucide="users"></i></div>
          <div class="status-card-value" id="stat-online">0</div>
          <div class="status-card-label">在线玩家</div>
        </div>
        <div class="status-card">
          <div class="status-card-icon"><i data-lucide="gamepad-2"></i></div>
          <div class="status-card-value" id="stat-version">-</div>
          <div class="status-card-label">服务器版本</div>
        </div>
        <div class="status-card">
          <div class="status-card-icon"><i data-lucide="activity"></i></div>
          <div class="status-card-value" id="stat-latency">-</div>
          <div class="status-card-label">延迟</div>
        </div>
        <div class="status-card">
          <div class="status-card-icon"><i data-lucide="clock"></i></div>
          <div class="status-card-value" id="stat-querytime">-</div>
          <div class="status-card-label">最后查询</div>
        </div>
      </div>

      <!-- 在线玩家列表 -->
      <div class="player-list-section fade-up" id="player-list-section" style="display:none">
        <h3>在线玩家</h3>
        <div class="player-list" id="player-list"></div>
      </div>

      <!-- 24h 在线图表 -->
      <div class="chart-section fade-up" id="chart-section" style="display:none">
        <h3>24 小时在线趋势</h3>
        <div id="player-chart" style="width:100%;height:300px;"></div>
      </div>
    </div>
  </section>

  <!-- 图集 -->
  <section class="section section-dark" id="gallery" style="display:none">
    <div class="container">
      <h2 class="section-title fade-up" id="section-gallery-title">服务器图集</h2>
      <div class="gallery-categories fade-up" id="gallery-categories"></div>
      <div class="gallery-grid fade-up" id="gallery-grid"></div>
      <div class="load-more fade-up" id="gallery-more" style="display:none">
        <button class="btn btn-outline" id="gallery-load-more">加载更多</button>
      </div>
    </div>
  </section>

  <!-- 动态 -->
  <section class="section" id="news">
    <div class="container">
      <h2 class="section-title fade-up" id="section-news-title">服务器动态</h2>
      <div class="news-categories fade-up" id="news-categories"></div>
      <div class="news-list fade-up" id="news-list"></div>
      <div class="load-more fade-up" id="news-more" style="display:none">
        <button class="btn btn-outline" id="news-load-more">加载更多</button>
      </div>
    </div>
  </section>

  <!-- 动态详情弹窗 -->
  <div class="modal" id="post-modal" style="display:none;">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-content--post">
      <button class="modal-close" id="post-modal-close">&times;</button>
      <div class="modal-scroll">
        <h2 id="post-detail-title"></h2>
        <div class="post-meta" id="post-detail-meta"></div>
        <div class="post-body" id="post-detail-body"></div>
      </div>
    </div>
  </div>

  <!-- 留言区 -->
  <section class="section section-dark" id="comments" style="display:none">
    <div class="container">
      <h2 class="section-title fade-up" id="section-comments-title">留言板</h2>
      <div class="comment-form-wrap fade-up">
        <form id="comment-form" class="comment-form">
          <div class="form-row">
            <input type="text" id="comment-nickname" placeholder="你的昵称 *" required />
            <input type="email" id="comment-email" placeholder="邮箱（可选）" />
          </div>
          <input type="text" name="website" id="comment-hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;" />
          <input type="hidden" id="comment-ts" />
          <textarea id="comment-content" placeholder="写下你的留言..." rows="4" required></textarea>
          <button type="submit" class="btn btn-primary">提交留言</button>
        </form>
      </div>
    </div>
    <div class="comment-marquee fade-up" id="comment-marquee">
      <div class="comment-scroll-track" id="comment-list"></div>
    </div>
  </section>

  <!-- 白名单申请 -->
  <section class="section" id="whitelist" style="display:none">
    <div class="container">
      <h2 class="section-title fade-up">白名单申请</h2>
      <div class="whitelist-wrap fade-up">
        <form id="whitelist-form" class="whitelist-form">
          <div class="form-row">
            <input type="text" id="wl-player-name" placeholder="游戏ID *" required />
            <select id="wl-platform">
              <option value="java">Java 版</option>
              <option value="bedrock">基岩版</option>
            </select>
          </div>
          <input type="text" name="website" id="wl-hp" autocomplete="off" tabindex="-1" style="position:absolute;left:-9999px;opacity:0;height:0;" />
          <input type="hidden" id="wl-ts" />
          <input type="text" id="wl-contact" placeholder="联系方式（QQ/微信）" />
          <textarea id="wl-reason" placeholder="申请理由..." rows="3"></textarea>
          <button type="submit" class="btn btn-primary">提交申请</button>
        </form>

        <div class="whitelist-check">
          <h3>查询申请状态</h3>
          <div class="wl-check-row">
            <input type="text" id="wl-check-name" placeholder="输入游戏ID查询" />
            <button class="btn btn-primary" id="wl-check-btn">查询</button>
          </div>
          <div id="wl-check-result"></div>
        </div>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="footer-main">
        <div class="footer-left">
          <p class="footer-brand" id="footer-text">Minecraft Server</p>
          <p class="footer-copyright" id="footer-copyright"></p>
          <p class="footer-icp" id="footer-icp"></p>
        </div>
        <div class="footer-right">
          <div class="footer-col" id="footer-social"></div>
          <div class="footer-col" id="footer-contacts"></div>
          <div class="footer-col" id="footer-links"></div>
        </div>
      </div>
      <div class="footer-custom" id="footer-custom-html"></div>
    </div>
  </footer>

  <script src="../shared/js/api-client.js"></script>
  <script src="../shared/js/utils.js"></script>
  <script src="../shared/js/toast.js"></script>
  <script src="../shared/js/lightbox.js"></script>
  <script src="js/config.js"></script>
  <script src="js/app.js?v=3"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
